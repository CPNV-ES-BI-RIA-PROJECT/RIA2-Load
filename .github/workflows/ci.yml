name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        java:
          - "21"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: maven

      - name: Purge surefire artifacts (avoid corrupted cache)
        run: |
          rm -rf ~/.m2/repository/org/apache/maven/plugins/maven-surefire-plugin
          rm -rf ~/.m2/repository/org/apache/maven/surefire

      - name: Build & test (Maven) with mirror + retries
        run: |
          mvn -B -ntp -s .github/maven-settings.xml \
            -Dmaven.wagon.http.retryHandler.count=6 \
            -Dmaven.wagon.http.retryHandler.requestSentEnabled=true \
            clean verify
      
